<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LGFV Cross-Locality Capital Network</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #14161d; --panel: #1c1f28; --panel-edge: #2b2f3c;
    --paper: #e8e6df; --dim: #9aa0ad; --faint: #5c6270;
    --east: #4c7edb; --south: #e0645c; --north: #e8b04b; --central: #58b89b;
    --southwest: #9a6fd0; --northwest: #d98a3d; --northeast: #6fa8dc; --other: #7d828f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: var(--ink);
    font-family: 'IBM Plex Sans', sans-serif; color: var(--paper); }
  svg#stage { position: absolute; inset: 0; width: 100%; height: 100%; cursor: grab; }
  svg#stage:active { cursor: grabbing; }

  .panel { position: absolute; background: var(--panel); border: 1px solid var(--panel-edge);
    border-radius: 10px; padding: 16px 18px; box-shadow: 0 8px 30px rgba(0,0,0,.45); }
  #hud { top: 18px; left: 18px; width: 292px; max-height: calc(100vh - 36px); overflow-y: auto; }
  #hud h1 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 21px;
    line-height: 1.2; letter-spacing: .01em; }
  #hud .sub { color: var(--dim); font-size: 12.5px; margin: 6px 0 14px; line-height: 1.5; }
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .stat { background: var(--ink); border-radius: 7px; padding: 8px 10px; }
  .stat b { font-family: 'IBM Plex Mono', monospace; font-size: 17px; font-weight: 500; display: block; }
  .stat span { font-size: 10.5px; color: var(--dim); letter-spacing: .04em; text-transform: uppercase; }

  .lgd { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .chip { display: inline-flex; align-items: center; gap: 6px; font-size: 12px;
    padding: 4px 10px; border-radius: 20px; border: 1px solid var(--panel-edge);
    cursor: pointer; user-select: none; transition: opacity .15s; background: var(--ink); }
  .chip .dot { width: 9px; height: 9px; border-radius: 50%; }
  .chip.off { opacity: .32; }

  label.ctl { display: block; font-size: 11.5px; color: var(--dim); letter-spacing: .04em;
    text-transform: uppercase; margin: 12px 0 5px; }
  input[type=range] { width: 100%; accent-color: var(--east); }
  input[type=search] { width: 100%; background: var(--ink); border: 1px solid var(--panel-edge);
    border-radius: 7px; color: var(--paper); padding: 8px 10px; font-size: 13px;
    font-family: 'IBM Plex Sans', sans-serif; }
  input[type=search]:focus { outline: 2px solid var(--east); outline-offset: 1px; }
  #stakeVal { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--paper); }

  #corridors { top: 18px; right: 18px; width: 250px; max-height: calc(100vh - 36px); overflow-y: auto; }
  #corridors h2 { font-family: 'Fraunces', serif; font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  #corridors .sub { color: var(--dim); font-size: 11.5px; margin-bottom: 10px; }
  .corr { display: flex; justify-content: space-between; align-items: baseline; gap: 8px;
    padding: 7px 9px; border-radius: 7px; cursor: pointer; font-size: 12.5px; }
  .corr:hover { background: var(--ink); }
  .corr.active { background: var(--ink); outline: 1px solid var(--east); }
  .corr .n { font-family: 'IBM Plex Mono', monospace; color: var(--dim); font-size: 12px; }
  .corr .arrow { color: var(--faint); padding: 0 2px; }

  #tip { position: absolute; pointer-events: none; background: #0e1015ee; border: 1px solid var(--panel-edge);
    border-radius: 8px; padding: 10px 12px; font-size: 12.5px; max-width: 300px; display: none;
    line-height: 1.5; z-index: 10; }
  #tip .t-name { font-weight: 500; }
  #tip .t-meta { color: var(--dim); font-size: 11.5px; margin-top: 3px; font-family: 'IBM Plex Mono', monospace; }

  #reset { position: absolute; bottom: 18px; left: 18px; background: var(--panel);
    color: var(--paper); border: 1px solid var(--panel-edge); border-radius: 7px;
    padding: 8px 14px; font-size: 12.5px; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif; }
  #reset:hover { background: var(--panel-edge); }
  @media (max-width: 900px) { #corridors { display: none; } #hud { width: 240px; } }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>
<svg id="stage" role="img" aria-label="Force-directed network graph of 215 cross-locality LGFV investment edges connecting 263 entities across Chinese cities"></svg>

<aside id="hud" class="panel">
  <h1>Cross-locality capital</h1>
  <p class="sub">LGFV investment edges that cross city lines. Anchors are large nodes; hover any node or edge, click to isolate a neighborhood, drag to pin.</p>
  <div class="stats">
    <div class="stat"><b>54</b><span>anchors</span></div>
    <div class="stat"><b>215</b><span>edges</span></div>
    <div class="stat"><b>263</b><span>entities</span></div>
  </div>
  <label class="ctl">Regions (click to toggle)</label>
  <div class="lgd" id="legend"></div>
  <label class="ctl">Minimum stake — <span id="stakeVal">0%</span></label>
  <input type="range" id="stake" min="0" max="100" value="0" step="5" aria-label="Minimum ownership stake filter">
  <label class="ctl" for="q">Find an entity</label>
  <input type="search" id="q" placeholder="e.g. Ezhou, Shoukai, 首开…" aria-label="Search entities">
</aside>

<aside id="corridors" class="panel">
  <h2>Corridor index</h2>
  <p class="sub">Densest city-to-city routes. Click to trace.</p>
  <div id="corrList"></div>
</aside>

<div id="tip"></div>
<button id="reset">Reset view</button>

function wOf(l) { return l.pct == null ? 1 : 0.7 + (l.pct/100) * 2.6; }

const link = root.append('g').selectAll('line').data(links).join('line')
  .attr('stroke', '#39404f').attr('stroke-width', wOf).attr('stroke-opacity', 0.55);

const node = root.append('g').selectAll('circle').data(nodes).join('circle')
  .attr('r', rOf)
  .attr('fill', d => COLORS[d.region] || COLORS.Other)
  .attr('stroke', d => d.anchor ? '#e8e6df' : 'none')
  .attr('stroke-width', d => d.anchor ? 1.4 : 0)
  .attr('fill-opacity', d => d.anchor ? 0.95 : 0.78)
  .style('cursor', 'pointer')
  .call(d3.drag()
    .on('start', (e,d) => { if (!e.active) sim.alphaTarget(0.25).restart(); d.fx = d.x; d.fy = d.y; })
    .on('drag', (e,d) => { d.fx = e.x; d.fy = e.y; })
    .on('end', (e,d) => { if (!e.active) sim.alphaTarget(0); }));

const label = root.append('g').selectAll('text')
  .data(nodes.filter(d => d.anchor && d.deg >= 4)).join('text')
  .text(d => d.id.length > 34 ? d.id.slice(0, 33) + '…' : d.id)
  .attr('font-size', 10.5).attr('fill', '#c9cdd6')
  .attr('font-family', "'IBM Plex Sans', sans-serif")
  .attr('paint-order', 'stroke').attr('stroke', '#14161d').attr('stroke-width', 3)
  .attr('pointer-events', 'none');

sim.on('tick', () => {
  link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  node.attr('cx', d => d.x).attr('cy', d => d.y);
  label.attr('x', d => d.x + rOf(d) + 4).attr('y', d => d.y + 3.5);
});

// ---------- interactivity ----------
const tip = document.getElementById('tip');
node.on('mouseenter', (e, d) => {
  tip.style.display = 'block';
  tip.innerHTML = `<div class="t-name">${d.id}</div>
    <div class="t-meta">${d.anchor ? 'ANCHOR LGFV' : 'investee'} · ${d.city || '—'} · ${d.region} · ${d.deg} cross-city edge${d.deg>1?'s':''}</div>`;
}).on('mousemove', e => {
  tip.style.left = Math.min(e.clientX + 14, window.innerWidth - 320) + 'px';
  tip.style.top = (e.clientY + 12) + 'px';
}).on('mouseleave', () => tip.style.display = 'none')
  .on('click', (e, d) => { focusNode = (focusNode === d.id) ? null : d.id; focusCorr = null; refresh(); e.stopPropagation(); });

link.on('mouseenter', (e, d) => {
  tip.style.display = 'block';
  tip.innerHTML = `<div class="t-name">${d.source.id}</div>
    <div class="t-meta">⟶ ${d.pct != null ? d.pct.toFixed(2) + '%' : 'stake n/a'}</div>
    <div class="t-name" style="margin-top:2px">${d.target.id}</div>
    <div class="t-meta">${d.source.city} ⟶ ${d.target.city}</div>`;
}).on('mousemove', e => {
  tip.style.left = Math.min(e.clientX + 14, window.innerWidth - 320) + 'px';
  tip.style.top = (e.clientY + 12) + 'px';
}).on('mouseleave', () => tip.style.display = 'none');

svg.on('click', () => { focusNode = null; focusCorr = null; refresh(); });

// legend
const lg = d3.select('#legend');
REGIONS.forEach(r => {
  lg.append('span').attr('class', 'chip').attr('role','button').attr('tabindex',0)
    .html(`<span class="dot" style="background:${COLORS[r]}"></span>${r}`)
    .on('click keydown', function(e) {
      if (e.type === 'keydown' && e.key !== 'Enter' && e.key !== ' ') return;
      if (activeRegions.has(r)) activeRegions.delete(r); else activeRegions.add(r);
      d3.select(this).classed('off', !activeRegions.has(r));
      refresh();
    });
});

document.getElementById('stake').addEventListener('input', e => {
  minStake = +e.target.value;
  document.getElementById('stakeVal').textContent = minStake + '%';
  refresh();
});
document.getElementById('q').addEventListener('input', e => {
  searchTerm = e.target.value.trim().toLowerCase(); refresh();
});
document.getElementById('reset').addEventListener('click', () => {
  focusNode = null; focusCorr = null; minStake = 0; searchTerm = '';
  document.getElementById('stake').value = 0;
  document.getElementById('stakeVal').textContent = '0%';
  document.getElementById('q').value = '';
  activeRegions.clear(); REGIONS.forEach(r => activeRegions.add(r));
  d3.selectAll('.chip').classed('off', false);
  refresh();
});

// corridor index
const cl = d3.select('#corrList');
DATA.corridors.forEach((c, i) => {
  cl.append('div').attr('class', 'corr').attr('role','button').attr('tabindex',0)
    .html(`<span>${c.from} <span class="arrow">⟶</span> ${c.to}</span><span class="n">${c.n}</span>`)
    .on('click keydown', function(e) {
      if (e.type === 'keydown' && e.key !== 'Enter' && e.key !== ' ') return;
      const key = c.from + '|' + c.to;
      focusCorr = (focusCorr === key) ? null : key; focusNode = null;
      d3.selectAll('.corr').classed('active', false);
      if (focusCorr) d3.select(this).classed('active', true);
      refresh();
    });
});

function linkVisible(l) {
  if (l.pct != null && l.pct < minStake) return false;
  if (l.pct == null && minStake > 0) return false;
  if (!activeRegions.has(l.source.region) && !activeRegions.has(l.target.region)) return false;
  return true;
}

function refresh() {
  const visLinks = new Set();
  links.forEach(l => { if (linkVisible(l)) visLinks.add(l); });

  let emph = null; // set of node ids to emphasize
  if (focusNode) {
    emph = new Set([focusNode]);
    links.forEach(l => {
      if (l.source.id === focusNode || l.target.id === focusNode) {
        emph.add(l.source.id); emph.add(l.target.id);
      }
    });
  } else if (focusCorr) {
    const [f, t] = focusCorr.split('|');
    emph = new Set();
    links.forEach(l => {
      if (l.source.city === f && l.target.city === t) { emph.add(l.source.id); emph.add(l.target.id); }
    });
  } else if (searchTerm) {
    emph = new Set();
    nodes.forEach(n => { if (n.id.toLowerCase().includes(searchTerm)) emph.add(n.id); });
    links.forEach(l => {
      if (emph.has(l.source.id) || emph.has(l.target.id)) { emph.add(l.source.id); emph.add(l.target.id); }
    });
  }

  node.attr('display', d => activeRegions.has(d.region) || (emph && emph.has(d.id)) ? null : 'none')
      .attr('opacity', d => !emph ? 1 : (emph.has(d.id) ? 1 : 0.12));
  label.attr('opacity', d => {
    if (!activeRegions.has(d.region) && !(emph && emph.has(d.id))) return 0;
    return !emph ? 1 : (emph.has(d.id) ? 1 : 0.08);
  });
  link.attr('display', d => visLinks.has(d) ? null : 'none')
      .attr('stroke', d => {
        if (focusCorr) { const [f,t] = focusCorr.split('|');
          return (d.source.city === f && d.target.city === t) ? '#e8e6df' : '#39404f'; }
        if (emph && emph.has(d.source.id) && emph.has(d.target.id)) return '#8b93a6';
        return '#39404f';
      })
      .attr('stroke-opacity', d => {
        if (!emph) return 0.55;
        return (emph.has(d.source.id) && emph.has(d.target.id)) ? 0.85 : 0.06;
      });
}
</script>
</body>
</html>
